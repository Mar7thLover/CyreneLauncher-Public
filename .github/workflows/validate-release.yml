# Validates that a published release ships at least one of:
#   - cyrene-launcher.exe       (launcher self-update channel)
#   - Astrolabe_OS.dll + Astrolabe_CN.dll  (patch DLL channel, both required)
#
# Releases can mix all three — the launcher and the patch reader each pick
# the newest release containing their asset independently.
name: Validate Release Assets

on:
  release:
    types: [published, edited, released]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          known=("cyrene-launcher.exe" "Astrolabe_OS.dll" "Astrolabe_CN.dll")

          got=$(gh release view "$TAG" \
            --repo "${{ github.repository }}" \
            --json assets --jq '.assets[].name' \
            | sort -u)

          echo "Found assets:"
          echo "$got" | sed 's/^/  - /'

          has_launcher=0
          has_os=0
          has_cn=0
          grep -qx 'cyrene-launcher.exe' <<<"$got" && has_launcher=1 || true
          grep -qx 'Astrolabe_OS.dll'    <<<"$got" && has_os=1       || true
          grep -qx 'Astrolabe_CN.dll'    <<<"$got" && has_cn=1       || true

          launcher_release=$has_launcher
          patch_release=$(( has_os == 1 && has_cn == 1 ? 1 : 0 ))
          partial_patch=$(( (has_os + has_cn) == 1 ? 1 : 0 ))

          if [ $partial_patch -eq 1 ]; then
            echo "::error::Patch DLLs must ship as a pair (Astrolabe_OS.dll + Astrolabe_CN.dll)."
            exit 1
          fi

          if [ $launcher_release -eq 0 ] && [ $patch_release -eq 0 ]; then
            echo "::error::Release must contain either cyrene-launcher.exe or both Astrolabe_{OS,CN}.dll."
            exit 1
          fi

          extras=$(comm -23 \
            <(echo "$got") \
            <(printf '%s\n' "${known[@]}" | sort -u) || true)
          if [ -n "$extras" ]; then
            echo "::warning::Unexpected assets present (launcher will ignore them):"
            echo "$extras" | sed 's/^/  - /'
          fi

          [ $launcher_release -eq 1 ] && echo "Launcher release detected."
          [ $patch_release    -eq 1 ] && echo "Patch release detected."
